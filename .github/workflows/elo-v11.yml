name: Elo v1.1 Batch Compute

on:
  workflow_dispatch:
    inputs:
      run_label:
        description: 'Elo run label (for elo_runs table)'
        required: false
        default: ''
      sources:
        description: 'Ingest sources (space-separated) or "all"'
        required: false
        default: 'all'
  schedule:
    # 每天 HKT 04:00 (UTC 20:00 前一日) — scraper 之後
    - cron: '0 20 * * *'

permissions:
  contents: read

jobs:
  compute:
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout hkjc-data
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: '.elo-pipeline/package.json'

      - name: Install pipeline deps
        working-directory: .elo-pipeline
        run: |
          npm install --no-audit --no-fund
          echo "--- installed ---"
          npx tsx --version
          node -e "console.log('better-sqlite3 version:', require('better-sqlite3/package.json').version)"

      - name: Typecheck pipeline
        working-directory: .elo-pipeline
        run: npx tsc --noEmit

      - name: Ingest all CSVs → bulk.db
        working-directory: .elo-pipeline
        env:
          SOURCES: ${{ github.event.inputs.sources || 'all' }}
        run: |
          set -e
          echo "=== Ingesting: $SOURCES ==="
          npx tsx scripts/ingest/index.ts $SOURCES --data-dir=.. --db=./bulk.db
          echo "=== Ingest done ==="
          ls -lh bulk.db
          echo "--- table row counts ---"
          node -e "
          const Database = require('better-sqlite3');
          const db = new Database('./bulk.db', { readonly: true });
          const tables = db.prepare(\"SELECT name FROM sqlite_master WHERE type='table' ORDER BY name\").all();
          for (const t of tables) {
            try {
              const c = db.prepare(\`SELECT COUNT(*) AS n FROM \\\"\${t.name}\\\"\`).get();
              console.log(\`\${t.name.padEnd(40)} \${c.n}\`);
            } catch(e) {}
          }
          db.close();
          "

      - name: Compute Elo v1.1 (overall + axes + jockey + trainer)
        working-directory: .elo-pipeline
        env:
          RUN_LABEL: ${{ github.event.inputs.run_label || '' }}
        run: |
          set -e
          LABEL_FLAG=""
          if [ -n "$RUN_LABEL" ]; then LABEL_FLAG="--run-label=$RUN_LABEL"; fi
          echo "=== Computing Elo v1.1 (label='$RUN_LABEL') ==="
          npx tsx scripts/elo/compute_v11.ts --db=./bulk.db $LABEL_FLAG
          echo "=== Compute done ==="

      - name: Summarize Elo output
        working-directory: .elo-pipeline
        run: |
          node -e "
          const Database = require('better-sqlite3');
          const db = new Database('./bulk.db', { readonly: true });
          const runs = db.prepare('SELECT id, run_label, started_at, finished_at, snapshots_written FROM elo_runs ORDER BY started_at DESC LIMIT 5').all();
          console.log('--- Recent elo_runs ---');
          for (const r of runs) console.log(JSON.stringify(r));
          const counts = {
            horse: db.prepare('SELECT COUNT(*) AS n FROM horse_elo_snapshots').get().n,
            jockey: db.prepare('SELECT COUNT(*) AS n FROM jockey_elo_snapshots').get().n,
            trainer: db.prepare('SELECT COUNT(*) AS n FROM trainer_elo_snapshots').get().n,
          };
          console.log('--- Snapshot counts ---');
          console.log(JSON.stringify(counts, null, 2));
          const axes = db.prepare(\"SELECT DISTINCT axis_key FROM horse_elo_snapshots WHERE axis_key IS NOT NULL ORDER BY axis_key\").all();
          console.log('--- Distinct axes (horse) ---');
          for (const a of axes) console.log(a.axis_key);
          db.close();
          "

      - name: Compress DB for artifact
        working-directory: .elo-pipeline
        run: |
          gzip -k -9 bulk.db
          ls -lh bulk.db bulk.db.gz

      - name: Upload bulk.db artifact
        uses: actions/upload-artifact@v4
        with:
          name: elo-v11-bulk-db-${{ github.run_number }}
          path: .elo-pipeline/bulk.db.gz
          retention-days: 14
          compression-level: 0

      - name: Job summary
        if: always()
        working-directory: .elo-pipeline
        run: |
          {
            echo "## Elo v1.1 Compute Run #${{ github.run_number }}"
            echo ""
            echo "- Triggered by: \`${{ github.event_name }}\`"
            echo "- Run label: \`${{ github.event.inputs.run_label || '(default)' }}\`"
            echo "- Sources: \`${{ github.event.inputs.sources || 'all' }}\`"
            echo "- Artifact: \`elo-v11-bulk-db-${{ github.run_number }}\` (bulk.db.gz)"
            if [ -f bulk.db ]; then
              echo "- DB size: \`$(du -h bulk.db | cut -f1)\`"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
